<svg width="800" height="550" viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; }
    .box { rx: 8; ry: 8; }
    .sm-box { rx: 6; ry: 6; }
  </style>

  <!-- Center Hub -->
  <circle cx="400" cy="275" r="60" fill="#1a1a2e" stroke="#e94560" stroke-width="3"/>
  <text x="400" y="265" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">File System</text>
  <text x="400" y="285" text-anchor="middle" fill="#e94560" font-size="11">State Machine</text>

  <!-- Left Column -->
  <rect x="50" y="50" width="160" height="50" rx="8" fill="#16213e"/>
  <text x="130" y="72" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">00-orchestrate</text>
  <text x="130" y="72" text-anchor="middle" fill="#aaa" font-size="9" dy="16">Planning</text>
  <line x1="210" y1="75" x2="345" y2="235" stroke="#666" stroke-width="1.5"/>

  <rect x="50" y="130" width="160" height="50" rx="8" fill="#0f3460"/>
  <text x="130" y="152" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">01-contract</text>
  <text x="130" y="152" text-anchor="middle" fill="#aaa" font-size="9" dy="16">Locked</text>
  <line x1="210" y1="155" x2="345" y2="250" stroke="#666" stroke-width="1.5"/>

  <rect x="50" y="210" width="160" height="50" rx="8" fill="#27ae60"/>
  <text x="130" y="232" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">02-ready</text>
  <text x="130" y="232" text-anchor="middle" fill="#fff" font-size="9" dy="16">Pending ⏳</text>
  <line x1="210" y1="235" x2="345" y2="265" stroke="#27ae60" stroke-width="2"/>

  <rect x="50" y="290" width="160" height="50" rx="8" fill="#f39c12"/>
  <text x="130" y="312" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">03-running</text>
  <text x="130" y="312" text-anchor="middle" fill="#fff" font-size="9" dy="16">Active ▶️</text>
  <line x1="210" y1="315" x2="345" y2="280" stroke="#f39c12" stroke-width="2"/>

  <rect x="50" y="370" width="160" height="50" rx="8" fill="#3498db"/>
  <text x="130" y="392" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">04-review</text>
  <text x="130" y="392" text-anchor="middle" fill="#fff" font-size="9" dy="16">Reviewing 👁️</text>
  <line x1="210" y1="395" x2="345" y2="295" stroke="#3498db" stroke-width="2"/>

  <!-- Right Column -->
  <rect x="590" y="130" width="160" height="50" rx="8" fill="#27ae60"/>
  <text x="670" y="152" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">05-done</text>
  <text x="670" y="152" text-anchor="middle" fill="#fff" font-size="9" dy="16">Done ✅</text>
  <line x1="590" y1="155" x2="455" y2="250" stroke="#27ae60" stroke-width="2"/>

  <rect x="590" y="210" width="160" height="50" rx="8" fill="#e74c3c"/>
  <text x="670" y="232" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">06-fix</text>
  <text x="670" y="232" text-anchor="middle" fill="#fff" font-size="9" dy="16">Fixing 🐛</text>
  <line x1="590" y1="235" x2="455" y2="265" stroke="#e74c3c" stroke-width="2"/>

  <rect x="590" y="290" width="160" height="50" rx="8" fill="#9b59b6"/>
  <text x="670" y="312" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">07-pr</text>
  <text x="670" y="312" text-anchor="middle" fill="#fff" font-size="9" dy="16">PR Ready 📤</text>
  <line x1="590" y1="315" x2="455" y2="280" stroke="#9b59b6" stroke-width="2"/>

  <rect x="590" y="370" width="160" height="50" rx="8" fill="#1a1a2e"/>
  <text x="670" y="392" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">08-merged</text>
  <text x="670" y="392" text-anchor="middle" fill="#aaa" font-size="9" dy="16">Merged 🎉</text>
  <line x1="590" y1="395" x2="455" y2="295" stroke="#666" stroke-width="1.5"/>

  <!-- Archive -->
  <rect x="590" y="450" width="160" height="50" rx="8" fill="#7f8c8d"/>
  <text x="670" y="472" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">archive</text>
  <text x="670" y="472" text-anchor="middle" fill="#fff" font-size="9" dy="16">History 📦</text>
  <line x1="590" y1="475" x2="455" y2="315" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Transition Labels -->
  <text x="280" y="255" fill="#27ae60" font-size="10" font-weight="bold">mv</text>
  <text x="280" y="285" fill="#f39c12" font-size="10" font-weight="bold">mv</text>
  <text x="280" y="305" fill="#3498db" font-size="10" font-weight="bold">mv</text>
  <text x="510" y="255" fill="#27ae60" font-size="10" font-weight="bold">pass</text>
  <text x="510" y="285" fill="#e74c3c" font-size="10" font-weight="bold">fail</text>
  <text x="510" y="305" fill="#9b59b6" font-size="10" font-weight="bold">PR</text>
</svg>
