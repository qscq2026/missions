<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>

  <!-- User -->
  <rect x="250" y="20" width="300" height="50" rx="8" fill="#1a1a2e"/>
  <text x="400" y="52" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">👤 User / Human PM</text>
  <line x1="400" y1="70" x2="400" y2="95" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- SKILL.md -->
  <rect x="150" y="100" width="500" height="60" rx="8" fill="#e94560"/>
  <text x="400" y="128" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">📋 SKILL.md</text>
  <text x="400" y="128" text-anchor="middle" fill="#ffcccc" font-size="11" dy="18">Entry point + metadata + boot sequence</text>

  <line x1="200" y1="160" x2="120" y2="200" stroke="#666" stroke-width="2"/>
  <line x1="400" y1="160" x2="400" y2="200" stroke="#666" stroke-width="2"/>
  <line x1="600" y1="160" x2="680" y2="200" stroke="#666" stroke-width="2"/>

  <!-- Three Pillars -->
  <rect x="20" y="200" width="180" height="80" rx="8" fill="#16213e"/>
  <text x="110" y="225" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">⚙️ scripts/</text>
  <text x="110" y="245" text-anchor="middle" fill="#aaa" font-size="10">bootstrap.sh</text>
  <text x="110" y="260" text-anchor="middle" fill="#aaa" font-size="10">Lifecycle hooks</text>

  <rect x="310" y="200" width="180" height="80" rx="8" fill="#0f3460"/>
  <text x="400" y="225" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">📜 references/</text>
  <text x="400" y="245" text-anchor="middle" fill="#aaa" font-size="10">AGENTS.md</text>
  <text x="400" y="260" text-anchor="middle" fill="#aaa" font-size="10">CONFIG.md, PRINCIPLE.md</text>

  <rect x="600" y="200" width="180" height="80" rx="8" fill="#533483"/>
  <text x="690" y="225" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">📋 assets/</text>
  <text x="690" y="245" text-anchor="middle" fill="#aaa" font-size="10">feature-template.md</text>
  <text x="690" y="260" text-anchor="middle" fill="#aaa" font-size="10">pr-template.md, etc.</text>

  <line x1="110" y1="280" x2="400" y2="330" stroke="#666" stroke-width="2"/>
  <line x1="400" y1="280" x2="400" y2="330" stroke="#666" stroke-width="2"/>
  <line x1="690" y1="280" x2="400" y2="330" stroke="#666" stroke-width="2"/>

  <!-- Runtime -->
  <rect x="200" y="330" width="400" height="60" rx="8" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
  <text x="400" y="355" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">💾 Runtime State Machine</text>
  <text x="400" y="375" text-anchor="middle" fill="#aaa" font-size="12">.missions/ — created by agent at runtime</text>

  <line x1="250" y1="390" x2="150" y2="430" stroke="#666" stroke-width="2"/>
  <line x1="400" y1="390" x2="400" y2="430" stroke="#666" stroke-width="2"/>
  <line x1="550" y1="390" x2="650" y2="430" stroke="#666" stroke-width="2"/>

  <!-- Bottom Row -->
  <rect x="50" y="430" width="180" height="50" rx="8" fill="#27ae60"/>
  <text x="140" y="450" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">config.yaml</text>
  <text x="140" y="465" text-anchor="middle" fill="#ddd" font-size="10">User customization</text>

  <rect x="310" y="430" width="180" height="50" rx="8" fill="#3498db"/>
  <text x="400" y="450" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">CONTRACT.md</text>
  <text x="400" y="465" text-anchor="middle" fill="#ddd" font-size="10">Locked validation</text>

  <rect x="570" y="430" width="180" height="50" rx="8" fill="#9b59b6"/>
  <text x="660" y="450" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">State Folders</text>
  <text x="660" y="465" text-anchor="middle" fill="#ddd" font-size="10">02-ready → 08-merged</text>
</svg>
